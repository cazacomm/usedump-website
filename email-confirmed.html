<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Confirmed — UseDump</title>
    <meta name="robots" content="noindex, nofollow">

    <link rel="icon" href="https://usedump.com/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="https://usedump.com/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://usedump.com/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://usedump.com/apple-touch-icon.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #FFFFFF;
            color: #1A1A1A;
            padding: 24px;
        }
        .card {
            background: #FFFFFF;
            border-radius: 20px;
            padding: 48px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .logo-mark {
            width: 72px;
            height: 72px;
            margin: 0 auto 24px;
            border-radius: 18px;
            display: block;
        }
        .checkmark {
            width: 56px;
            height: 56px;
            background: #FAD998;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .checkmark svg {
            width: 28px;
            height: 28px;
            stroke: #1A1A1A;
            stroke-width: 3;
            fill: none;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        p {
            font-size: 16px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 32px;
        }
        .cta {
            display: inline-block;
            background: #FAD998;
            color: #1A1A1A;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            padding: 14px 28px;
            border-radius: 12px;
            transition: transform 0.15s ease;
        }
        .cta:hover { transform: translateY(-1px); }
        .footer {
            font-size: 13px;
            color: #BBB;
            margin-top: 32px;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://usedump.com/apple-touch-icon.png" alt="UseDump" class="logo-mark">
        <div class="checkmark">
            <svg viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h1>Email confirmed!</h1>
        <p>You can now open UseDump.</p>
        <a href="https://apps.apple.com/app/usedump/id6761195391" class="cta">Open App Store</a>
        <div class="footer">UseDump. Your month. In photos.</div>
    </div>
</body>
</html>
