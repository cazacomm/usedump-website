<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful — UseDump</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #FAFAFA;
            color: #1A1A1A;
            padding: 24px;
        }
        @media (prefers-color-scheme: dark) {
            body { background-color: #1A1A1A; color: #F5F5F5; }
            .card { background-color: #2A2A2A; }
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 48px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
        }
        .checkmark {
            width: 72px;
            height: 72px;
            background: #FAD998;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .checkmark svg {
            width: 36px;
            height: 36px;
            stroke: white;
            stroke-width: 3;
            fill: none;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        p {
            font-size: 16px;
            color: #888;
            line-height: 1.5;
            margin-bottom: 32px;
        }
        .logo {
            font-size: 14px;
            color: #BBB;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="checkmark">
            <svg viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h1>Payment Successful!</h1>
        <p>Your order has been confirmed. You can close this page and go back to the UseDump app.</p>
        <div class="logo">UseDump. Your month. In photos.</div>
    </div>
</body>
</html>
